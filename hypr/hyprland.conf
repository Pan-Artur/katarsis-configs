### MONITORS ###
monitor = eDP-1, 1920x1080@60, 0x0, 1

### MY PROGRAMS ###
$terminal = kitty
$fileManager = nautilus
$menu = wofi -i --show drun --allow-images -D key_expand=Tab

### AUTOSTART ###
exec-once = kanshi
exec-once = waybar
exec-once = mako
exec-once = awww-daemon
exec-once = systemctl --user start bluetooth
exec-once = sleep 2
exec-once = wpctl set-default-sink alsa_output.pci-0000_00_1f.3.analog-stereo
exec-once = ~/bash/xdg-desktop

### ENVIRONMENT VARIABLES ###
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24

### LOOK AND FEEL ###
general {
    gaps_in = 5
    gaps_out = 10
    border_size = 2

    # Deep Blue / Tactical Cyan Gradient
    col.active_border = rgba(1e3a8aee) rgba(0ea5e9ee) 45deg
    col.inactive_border = rgba(050a15aa)

    resize_on_border = true
    layout = dwindle
}

decoration {
    rounding = 10

    active_opacity = 1.0
    inactive_opacity = 0.92

    shadow {
        enabled = true
        range = 12
        render_power = 3
        color = rgba(050a15ee) # Shadow: Midnight Deep
    }

    blur {
        enabled = true
        size = 5
        passes = 3
        new_optimizations = true
        vibrancy = 0.2
    }
}

animations {
    enabled = yes

    # Curves for Katarsis flow
    bezier = easeOutExpo, 0.16, 1, 0.3, 1
    bezier = softSnap, 0.1, 1.05, 0.1, 1.05
    bezier = linear, 0, 0, 1, 1

    animation = windows, 1, 4, easeOutExpo, slide
    animation = windowsIn, 1, 4, easeOutExpo, slide
    animation = windowsOut, 1, 4, easeOutExpo, slide
    animation = fade, 1, 4, easeOutExpo
    animation = workspaces, 1, 5, softSnap, slide
    
    # Border animations
    animation = border, 1, 1, default
    animation = borderangle, 1, 100, linear, loop 
}

dwindle {
    pseudotile = true
    preserve_split = true
}

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
    disable_splash_rendering = true
    background_color = 0x050a15
}

### INPUT ###
input {
    kb_layout = us,ua
    kb_options = grp:alt_shift_toggle,caps:escape
    follow_mouse = 1
    sensitivity = -0.4

    touchpad {
        natural_scroll = true
    }
}

### KEYBINDINGS ###
$mainMod = SUPER

# System Binds
bind = $mainMod, Q, exec, $terminal
bind = $mainMod, C, killactive,
bind = $mainMod, M, exit,
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, V, togglefloating,
bind = $mainMod, R, exec, $menu
bind = $mainMod, P, pseudo,
bind = $mainMod, J, togglesplit,
bind = $mainMod, F, fullscreen,
bind = $mainMod, N, exec, makoctl restore

# Custom Scripts / Wallpaper
bind = $mainMod SHIFT, R, exec, bun run /home/artur/Documents/wlchanger/src/index.js
bind = , XF86PowerOff, exec, /home/artur/.config/wofi/powermenu.sh

# Navigation
bind = $mainMod, left,  movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up,    movefocus, u
bind = $mainMod, down,  movefocus, d

# Workspaces
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move to Workspace
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Mouse Binds
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Volume / Brightness
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

# Media Control
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

# Screenshots
bind = , Print, exec, grim ~/Pictures/screenshot.png
bind = $mainMod, Print, exec, grim -g "$(slurp)" ~/Pictures/screenshot.png

### WINDOW RULES ###
windowrule = suppressevent maximize, class:.*
windowrule = nofocus,class:^$,title:^$,xwayland:1,floating:1,fullscreen:0,pinned:0
