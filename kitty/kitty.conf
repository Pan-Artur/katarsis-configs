### Fonts ###
font_family      JetBrainsMono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        12.0

### Appearance ###
foreground       #e2e8f0
background       #050a15
background_opacity 0.85

# Selection (Matching Hyprland active border)
selection_foreground #ffffff
selection_background #1e3a8a

### Cursor ###
cursor           #0ea5e9
cursor_shape     beam
cursor_beam_thickness 1.5

### Window ###
window_padding_width 12
confirm_os_window_close 0

### Color Palette (Tactical Blue & Soft White) ###
#
# Black
color0  #02050a
color8  #334155

# Red (Errors)
color1  #ef4444
color9  #f87171

# Green (Success)
